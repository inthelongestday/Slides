<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides</title>
<style>
  :root {
    --primary: #1e293b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-light: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --sidebar-bg: #1e293b;
    --sidebar-text: #cbd5e1;
    --sidebar-active: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    height: 100%;
    overflow: hidden;
  }

  .layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; transition: grid-template-columns 0.25s ease; }
  .layout.collapsed { grid-template-columns: 0px 1fr; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; width: 260px; height: 100vh; }
    .sidebar.open { transform: translateX(0); }
    .mobile-toggle { display: flex !important; }
  }

  .sidebar {
    background: var(--sidebar-bg); color: var(--sidebar-text); padding: 1.5rem 0;
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
    overflow-y: auto; overflow-x: hidden; transition: transform 0.25s ease;
  }
  .layout.collapsed .sidebar { transform: translateX(-260px); width: 0; padding: 0; }
  .sidebar-logo {
    padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 1rem; display: flex; align-items: flex-start; justify-content: space-between;
  }
  .sidebar-logo-text h2 { color: white; font-size: 1.25rem; letter-spacing: -0.02em; }
  .sidebar-logo-text .team { font-size: 0.78rem; color: var(--sidebar-text); opacity: 0.7; }
  .collapse-btn {
    background: rgba(255,255,255,0.1); border: none; color: var(--sidebar-text); cursor: pointer;
    padding: 4px 8px; border-radius: 4px; font-size: 1rem; margin-top: 2px;
  }
  .collapse-btn:hover { background: rgba(255,255,255,0.2); color: white; }
  .expand-btn {
    position: fixed; top: 12px; left: 12px; z-index: 50; background: var(--sidebar-bg); color: white;
    border: none; cursor: pointer; padding: 8px 12px; border-radius: 6px; font-size: 1rem; display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .expand-btn:hover { background: var(--accent); }

  .nav-section {
    padding: 0.5rem 1.5rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.35); font-weight: 600; margin-top: 1rem;
  }
  .nav-item {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 1.5rem; color: var(--sidebar-text);
    text-decoration: none; font-size: 0.88rem; cursor: pointer; border: none; background: none;
    width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
  .nav-item.active { background: var(--sidebar-active); color: white; }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-footer {
    margin-top: auto; padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 0.78rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  }
  .sidebar-footer .role-tag { opacity: 0.55; }
  .sidebar-footer button { background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--sidebar-text);
    border-radius: 4px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; }
  .sidebar-footer button:hover { background: rgba(255,255,255,0.1); color: white; }

  .doc-frame { width: 100%; border: none; display: none; height: calc(100vh - 6rem); border-radius: 8px; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .doc-frame.show { display: block; }
  .frame-toolbar { display: none; align-items: center; gap: 0.5rem; padding: 0.6rem 0; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .frame-toolbar.show { display: flex; }
  .frame-toolbar .frame-title { font-weight: 600; font-size: 0.95rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 768px) { .doc-frame { height: calc(100vh - 5rem); border-radius: 0; } }

  .main { padding: 2rem; min-width: 0; overflow-x: hidden; overflow-y: auto; }
  body.viewing .main { overflow: hidden; display: flex; flex-direction: column; }
  body.viewing .doc-frame { flex: 1 1 auto; height: auto; min-height: 0; }
  body.viewing .frame-toolbar { flex-shrink: 0; }
  .main-inner { max-width: 1000px; margin: 0 auto; width: 100%; }
  .mobile-toggle { display: none; align-items: center; gap: 0.5rem; background: var(--primary); color: white; border: none; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1rem; cursor: pointer; font-size: 0.9rem; }
  @media (max-width: 768px) { .main { padding: 1rem; } .doc-grid { grid-template-columns: 1fr; } }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .page-header h1 { font-size: 1.7rem; color: var(--primary); }
  .header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text); transition: all 0.15s; }
  .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: var(--green); color: white; border-color: var(--green); }
  .btn-danger { background: var(--red); color: white; border-color: var(--red); }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .search-bar { position: relative; margin-bottom: 1.5rem; }
  .search-bar input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: white; }
  .search-bar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .search-bar::before { content: '\1F50D'; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; }

  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .doc-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; transition: all 0.2s; text-decoration: none; color: inherit; display: block; position: relative; }
  .doc-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(59,130,246,0.12); transform: translateY(-2px); }
  .doc-card .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; margin-bottom: 0.6rem; }
  .tag-slide { background: #ede9fe; color: #6d28d9; }
  .tag-doc { background: #d1fae5; color: #065f46; }
  .tag-note { background: #e0e7ff; color: #3730a3; }
  .doc-card h3 { font-size: 1rem; margin-bottom: 0.3rem; color: var(--primary); }
  .doc-card p { font-size: 0.85rem; color: var(--text-light); margin: 0.3rem 0; }
  .doc-card .meta { font-size: 0.78rem; color: var(--text-light); }
  .card-actions { position: absolute; top: 0.6rem; right: 0.6rem; display: flex; gap: 0.3rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .drag-handle { cursor: grab; color: var(--text-light); user-select: none; font-size: 1rem; }
  .drag-handle:active { cursor: grabbing; }
  .doc-card.dragging { opacity: 0.4; }
  .doc-card.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; }

  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; padding: 2px 6px; font-size: 0.8rem; color: var(--text); line-height: 1.3; }
  .icon-btn:hover { background: #f1f5f9; }
  .mini-select { font-size: 0.76rem; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px; background: white; max-width: 130px; }

  .bottom-header { display: flex; align-items: center; justify-content: space-between; margin: 2rem 0 0.8rem; }
  .bottom-header h2 { font-size: 1.1rem; color: var(--primary); margin: 0; }
  .folder-block { margin-bottom: 0.4rem; }
  .folder-sec-title { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; color: var(--primary); font-size: 0.95rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 0.3rem; }
  .folder-sec-title .fname { flex: 1; }
  .page-list { list-style: none; margin: 0 0 0.6rem; padding: 0; }
  .page-list-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.42rem 0.2rem; border-bottom: 1px solid #f1f5f9; }
  .page-list-row:hover { background: #f8fafc; }
  .page-list-row .pl-link { flex: 1; cursor: pointer; color: var(--text); text-decoration: none; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .page-list-row .pl-link:hover { color: var(--accent); }
  .empty-state { padding: 2rem; text-align: center; color: var(--text-light); font-size: 0.9rem; }

  .nav-folder-row { display: flex; align-items: center; width: 100%; }
  .nav-folder-toggle { display: flex; align-items: center; gap: 0.4rem; flex: 1; padding: 0.5rem 1.5rem; color: var(--sidebar-text); background: none; border: none; cursor: pointer; font-size: 0.86rem; text-align: left; width: 100%; }
  .nav-folder-toggle:hover { background: rgba(255,255,255,0.08); color: white; }
  .nav-folder-caret { font-size: 0.7rem; transition: transform 0.15s; display: inline-block; width: 10px; flex-shrink: 0; }
  .nav-folder.open > .nav-folder-row .nav-folder-caret { transform: rotate(90deg); }
  .nav-folder-children { display: none; }
  .nav-folder.open > .nav-folder-children { display: block; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: 12px; width: 90%; max-width: 640px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; max-height: 88vh; display: flex; flex-direction: column; }
  .modal.modal-wide { max-width: 820px; }
  .modal-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .modal-header h3 { font-size: 1.1rem; }
  .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-light); padding: 0.2rem; }
  .modal-body { padding: 1.5rem; overflow-y: auto; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text); }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.9rem; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-group textarea.code-area { min-height: 260px; font-family: 'SF Mono', Consolas, monospace; font-size: 0.8rem; }
  .form-hint { font-size: 0.78rem; color: var(--text-light); margin-top: 0.3rem; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; background: #f8fafc; flex-shrink: 0; }
  .modal-footer .right { display: flex; gap: 0.5rem; }

  .login-gate { display: none; align-items: center; gap: 0.5rem; }
  .login-gate.show { display: flex; }
</style>
</head>
<body>

<div class="layout" id="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">
        <h2>Slides</h2>
        <div class="team">personal home</div>
      </div>
      <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">&#x2039;</button>
    </div>

    <div class="nav-section">Pages</div>
    <a class="nav-item active" id="navHome" onclick="showHome()"><span class="nav-icon">&#127968;</span> Home</a>
    <div id="nav-pinned-links"></div>
    <div id="nav-folder-tree"></div>

    <div class="sidebar-footer">
      <span class="role-tag" id="roleTag">viewer</span>
      <button id="loginBtn" onclick="openLoginModal()">로그인</button>
      <button id="logoutBtn" onclick="doLogout()" style="display:none;">로그아웃</button>
    </div>
  </nav>

  <main class="main">
    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776; Menu</button>

    <div class="frame-toolbar" id="frameToolbar">
      <button class="btn btn-sm" onclick="showHome()">&#8592; Back</button>
      <span class="frame-title" id="frameTitle"></span>
      <button class="btn btn-sm" id="frameEditBtn" style="display:none;" onclick="openEditPageModal(currentFrameId)">&#9998; 편집</button>
      <button class="btn btn-sm" onclick="openFrameInNewTab()">&#8599; New tab</button>
    </div>

    <iframe class="doc-frame" id="docFrame"></iframe>

    <div id="wikiContent" class="main-inner">
      <div class="page-header">
        <h1>내 슬라이드</h1>
        <div class="header-actions">
          <button class="btn btn-primary" id="newPageBtn" style="display:none;" onclick="openNewPageModal()">+ 새 페이지</button>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" placeholder="검색... (Ctrl+K)" oninput="filterCards(this.value)" id="searchInput">
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem;">
        <h2 style="font-size:1.1rem; color:var(--primary); margin:0;">Pinned</h2>
      </div>
      <div class="doc-grid" id="docGrid"></div>

      <div id="bottomSections"></div>
    </div>
  </main>
</div>
<button class="expand-btn" id="expandBtn" onclick="toggleSidebar()">&#9776;</button>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModalOverlay">
  <div class="modal">
    <div class="modal-header"><h3>로그인</h3><button class="modal-close" onclick="closeLoginModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="loginPassword" placeholder="owner 비밀번호">
      </div>
      <div id="loginError" style="color:#dc2626;font-size:0.85rem;display:none;">비밀번호가 올바르지 않습니다.</div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;">
      <button class="btn" onclick="closeLoginModal()">취소</button>
      <button class="btn btn-primary" onclick="submitLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- NEW / EDIT PAGE MODAL -->
<div class="modal-overlay" id="pageModalOverlay">
  <div class="modal modal-wide">
    <div class="modal-header"><h3 id="pageModalTitle">새 페이지 추가</h3><button class="modal-close" onclick="closePageModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="pageTitle" placeholder="예: AX STEP 1 — AI 이해하기">
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" id="pageDesc" placeholder="짧은 설명">
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select id="pageCategory">
          <option value="slide">Slide</option>
          <option value="doc">Doc</option>
          <option value="note">Note</option>
        </select>
      </div>
      <div class="form-group">
        <label>폴더</label>
        <select id="pageFolder"><option value="">📂 미분류(루트)</option></select>
      </div>
      <div class="form-group">
        <label>HTML 소스</label>
        <textarea id="pageHtml" class="code-area" placeholder="다른 에이전트가 만든 슬라이드 HTML 전체를 여기 붙여넣으세요."></textarea>
        <div class="form-hint">에이전트에게 줄 클론 프롬프트가 필요하면 말씀해주세요 — 이 테마 그대로 슬라이드를 생성하게 만든 프롬프트를 별도로 드릴게요.</div>
      </div>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger" id="pageDeleteBtn" style="display:none;" onclick="deleteCurrentPage()">삭제</button>
      </div>
      <div class="right">
        <button class="btn" onclick="closePageModal()">취소</button>
        <button class="btn btn-primary" id="pageSaveBtn" onclick="submitPage()">추가</button>
      </div>
    </div>
  </div>
</div>

<script src="storage.js"></script>
<script>
// ============================================================
// 상태
// ============================================================
var ROLE = 'viewer';
var editMode = false; // role === 'owner' 이면 true로 취급 (별도 토글 없음, 로그인=편집가능)
var hubState = { pages: [], layout: null };

function isOwner() { return ROLE === 'owner'; }

function persistHub() {
  WikiStorage.saveDoc({ pages: hubState.pages, layout: hubState.layout }, 'index.html');
}

function normalizePage(p) {
  p = p && typeof p === 'object' ? p : {};
  return {
    id: p.id,
    title: typeof p.title === 'string' && p.title ? p.title : 'Untitled',
    desc: typeof p.desc === 'string' ? p.desc : '',
    href: typeof p.href === 'string' ? p.href : '',
    category: typeof p.category === 'string' ? p.category : 'slide',
    meta: typeof p.meta === 'string' ? p.meta : ''
  };
}
function getCatalog() { return (Array.isArray(hubState.pages) ? hubState.pages : []).map(normalizePage); }
function saveCatalog(pages) { hubState.pages = pages; persistHub(); }

function escapeHtml(text) { var div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
function jq(s) { return escapeHtml(s).replace(/'/g, "\\'"); }
function tagHtml(cat) {
  var map = { slide: '<span class="tag tag-slide">Slide</span>', doc: '<span class="tag tag-doc">Doc</span>', note: '<span class="tag tag-note">Note</span>' };
  return map[cat] || map.slide;
}

// ============================================================
// LAYOUT (폴더 트리 + 핀 배치) — 구조는 레퍼런스와 동일한 모델
// ============================================================
var FOLDER_OPEN_KEY = 'slides_folder_open';
var MAX_FOLDER_DEPTH = 3;
function defaultLayout() { return { folders: [], pages: {}, pinOrder: [] }; }
function normalizeLayout(L) {
  L = L && typeof L === 'object' ? L : {};
  var folders = Array.isArray(L.folders) ? L.folders.map(function(f, i) {
    f = f && typeof f === 'object' ? f : {};
    return { id: f.id || ('f' + i), name: f.name || 'Folder', parentId: f.parentId || null, order: typeof f.order === 'number' ? f.order : i };
  }) : [];
  var pages = {};
  if (L.pages && typeof L.pages === 'object') {
    Object.keys(L.pages).forEach(function(h) {
      var pg = L.pages[h];
      if (pg && typeof pg === 'object') pages[h] = { folderId: pg.folderId || null, pinned: typeof pg.pinned === 'boolean' ? pg.pinned : true };
    });
  }
  return { folders: folders, pages: pages, pinOrder: Array.isArray(L.pinOrder) ? L.pinOrder.slice() : [] };
}
function fillLayout(L) {
  var catalog = getCatalog();
  var validFolder = {}; L.folders.forEach(function(f) { validFolder[f.id] = true; });
  var hrefSet = {};
  catalog.forEach(function(p) {
    hrefSet[p.href] = true;
    var pg = L.pages[p.href];
    if (!pg) { L.pages[p.href] = { folderId: null, pinned: true }; return; }
    pg.folderId = (pg.folderId && validFolder[pg.folderId]) ? pg.folderId : null;
  });
  L.pinOrder = L.pinOrder.filter(function(h) { return hrefSet[h] && L.pages[h] && L.pages[h].pinned; });
  var inOrder = {}; L.pinOrder.forEach(function(h) { inOrder[h] = true; });
  catalog.forEach(function(p) { if (L.pages[p.href].pinned && !inOrder[p.href]) L.pinOrder.push(p.href); });
  return L;
}
function getLayout() { return fillLayout(normalizeLayout(hubState.layout || defaultLayout())); }
function saveLayout(L) { hubState.layout = { folders: L.folders, pages: L.pages, pinOrder: L.pinOrder }; persistHub(); }

function foldersById(L) { var m = {}; L.folders.forEach(function(f) { m[f.id] = f; }); return m; }
function folderDepth(L, id) { var by = foldersById(L), d = 0, cur = id, g = 0; while (cur && g < 20) { d++; cur = by[cur] ? by[cur].parentId : null; g++; } return d; }
function childFolders(L, parentId) { return L.folders.filter(function(f) { return (f.parentId || null) === (parentId || null); }).sort(function(a,b){return a.order-b.order;}); }
function pagesInFolder(L, catalog, folderId) { return catalog.filter(function(p) { return (L.pages[p.href].folderId || null) === (folderId || null); }); }
function folderPath(L, id) { var by = foldersById(L), parts = [], cur = id, g = 0; while (cur && g < 20) { if (by[cur]) { parts.unshift(by[cur].name); cur = by[cur].parentId; } else break; g++; } return parts.join(' / '); }
function newFolderId() { return 'f' + Date.now().toString(36) + Math.floor(Math.random()*1296).toString(36); }

function getFolderOpen() { try { var o = JSON.parse(localStorage.getItem(FOLDER_OPEN_KEY)); return o && typeof o === 'object' ? o : {}; } catch(e) { return {}; } }
function setFolderOpenState(o) { localStorage.setItem(FOLDER_OPEN_KEY, JSON.stringify(o)); }
function toggleFolderOpen(id) { var o = getFolderOpen(); if (o[id]) delete o[id]; else o[id] = true; setFolderOpenState(o); renderSidebar(); }

function createFolder(parentId) {
  parentId = parentId || null;
  var L = getLayout();
  if (parentId && folderDepth(L, parentId) >= MAX_FOLDER_DEPTH) { alert('폴더는 ' + MAX_FOLDER_DEPTH + '단까지만 만들 수 있습니다.'); return; }
  var name = prompt(parentId ? '하위 폴더 이름:' : '새 폴더 이름:');
  if (name === null) return; name = name.trim(); if (!name) return;
  L.folders.push({ id: newFolderId(), name: name, parentId: parentId, order: childFolders(L, parentId).length });
  saveLayout(L);
  if (parentId) { var o = getFolderOpen(); o[parentId] = true; setFolderOpenState(o); }
  refreshAll();
}
function renameFolder(id) {
  var L = getLayout(), by = foldersById(L), f = by[id]; if (!f) return;
  var name = prompt('폴더 이름 변경:', f.name);
  if (name === null) return; name = name.trim(); if (!name) return;
  f.name = name; saveLayout(L); refreshAll();
}
function deleteFolder(id) {
  var L = getLayout(), by = foldersById(L), f = by[id]; if (!f) return;
  if (!confirm('폴더 "' + f.name + '"를 삭제합니다. 안의 페이지/하위 폴더는 상위로 이동합니다. 계속할까요?')) return;
  var parent = f.parentId || null;
  L.folders.forEach(function(x) { if ((x.parentId||null) === id) x.parentId = parent; });
  Object.keys(L.pages).forEach(function(h) { if ((L.pages[h].folderId||null) === id) L.pages[h].folderId = parent; });
  L.folders = L.folders.filter(function(x) { return x.id !== id; });
  saveLayout(L); refreshAll();
}
function ensurePage(L, href) { if (!L.pages[href]) L.pages[href] = { folderId: null, pinned: true }; return L.pages[href]; }
function movePage(href, folderId) { var L = getLayout(); ensurePage(L, href).folderId = folderId || null; saveLayout(L); refreshAll(); }
function togglePin(href) {
  var L = getLayout(); var pg = ensurePage(L, href);
  pg.pinned = !pg.pinned;
  if (pg.pinned) { if (L.pinOrder.indexOf(href) < 0) L.pinOrder.push(href); }
  else { L.pinOrder = L.pinOrder.filter(function(h){return h!==href;}); }
  saveLayout(L); refreshAll();
}
function reorderPin(srcHref, targetHref) {
  if (srcHref === targetHref) return;
  var L = getLayout(); var arr = L.pinOrder.slice();
  var from = arr.indexOf(srcHref); if (from < 0) return;
  arr.splice(from, 1);
  var to = arr.indexOf(targetHref);
  if (to < 0) arr.push(srcHref); else arr.splice(to, 0, srcHref);
  L.pinOrder = arr; saveLayout(L); refreshAll();
}
function moveSelectHtml(href) {
  var L = getLayout(); var cur = (L.pages[href] && L.pages[href].folderId) || '';
  var list = L.folders.slice().sort(function(a,b){ return folderPath(L,a.id).localeCompare(folderPath(L,b.id)); });
  var opts = '<option value="">📂 미분류(루트)</option>';
  list.forEach(function(f) { opts += '<option value="'+f.id+'"'+(f.id===cur?' selected':'')+'>'+escapeHtml(folderPath(L,f.id))+'</option>'; });
  return '<select class="mini-select" title="폴더로 이동" onclick="event.stopPropagation()" onchange="movePage(\''+jq(href)+'\', this.value)">'+opts+'</select>';
}
function pinBtnHtml(href, pinned) {
  return '<button class="icon-btn" onclick="event.stopPropagation();togglePin(\''+jq(href)+'\')" title="'+(pinned?'상단에서 내리기':'상단에 고정')+'">'+(pinned?'📌':'📍')+'</button>';
}
function folderIcon(size) { size = size||15; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" style="vertical-align:-3px;flex-shrink:0;"><path fill="#f59e0b" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>'; }
function pageIcon(size) { size = size||14; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" style="vertical-align:-2px;flex-shrink:0;"><path fill="#3b82f6" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/><path fill="#bfdbfe" d="M14 2v6h6z"/></svg>'; }

// ============================================================
// RENDER — 상단 핀 그리드
// ============================================================
function renderPins() {
  var L = getLayout(); var catalog = getCatalog();
  var byHref = {}; catalog.forEach(function(p) { byHref[p.href] = p; });
  var pinned = L.pinOrder.map(function(h) { return byHref[h]; }).filter(Boolean);
  var grid = document.getElementById('docGrid');

  if (pinned.length === 0) {
    grid.innerHTML = isOwner()
      ? '<div class="empty-state" style="grid-column:1/-1;">핀된 페이지가 없습니다. 아래 목록에서 📍로 고정하세요.</div>'
      : '<div class="empty-state" style="grid-column:1/-1;">표시할 페이지가 없습니다.</div>';
  } else {
    grid.innerHTML = pinned.map(function(p) {
      var inner = tagHtml(p.category) + '<h3>' + escapeHtml(p.title) + '</h3>' +
        '<p>' + escapeHtml(p.desc) + '</p>' +
        (p.meta ? '<div class="meta">' + escapeHtml(p.meta) + '</div>' : '');
      if (isOwner()) {
        return '<div class="doc-card" draggable="true" data-href="'+escapeHtml(p.href)+'" style="cursor:default;">' +
          '<div class="card-actions">' +
            '<span class="drag-handle" title="드래그로 순서 변경">&#9776;</span>' +
            '<button class="icon-btn" onclick="openEditPageModal(\''+jq(p.id)+'\')" title="편집">&#9998;</button>' +
            moveSelectHtml(p.href) + pinBtnHtml(p.href, true) +
          '</div>' + inner + '</div>';
      }
      return '<div class="doc-card" onclick="openDoc(\''+jq(p.href)+'\', \''+jq(p.title)+'\', \''+jq(p.id)+'\')" style="cursor:pointer;">' + inner + '</div>';
    }).join('');
    if (isOwner()) attachPinDnD();
  }
}
var dragSrcHref = null;
function attachPinDnD() {
  document.querySelectorAll('#docGrid .doc-card[draggable="true"]').forEach(function(card) {
    card.addEventListener('dragstart', function(e) { dragSrcHref = card.getAttribute('data-href'); card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain', dragSrcHref);}catch(_){} });
    card.addEventListener('dragend', function() { card.classList.remove('dragging'); document.querySelectorAll('#docGrid .doc-card').forEach(function(c){c.classList.remove('drag-over');}); dragSrcHref=null; });
    card.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; card.classList.add('drag-over'); });
    card.addEventListener('dragleave', function() { card.classList.remove('drag-over'); });
    card.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      var target = card.getAttribute('data-href');
      var src = dragSrcHref || (function(){ try { return e.dataTransfer.getData('text/plain'); } catch(_) { return null; } })();
      if (src && target && src !== target) reorderPin(src, target);
    });
  });
}

// ============================================================
// RENDER — 하단 폴더/전체 목록
// ============================================================
function pageRowHtml(L, p) {
  var pinned = L.pages[p.href].pinned;
  var open = 'openDoc(\''+jq(p.href)+'\', \''+jq(p.title)+'\', \''+jq(p.id)+'\')';
  var h = '<li class="page-list-row" data-href="'+escapeHtml(p.href)+'">' + pageIcon() +
    '<a class="pl-link" onclick="'+open+'">'+escapeHtml(p.title)+'</a><span>'+tagHtml(p.category)+'</span>';
  if (isOwner()) h += '<button class="icon-btn" onclick="openEditPageModal(\''+jq(p.id)+'\')" title="편집">&#9998;</button>' + moveSelectHtml(p.href) + pinBtnHtml(p.href, pinned);
  return h + '</li>';
}
function folderBlockHtml(L, catalog, folder, depth) {
  var indent = (depth-1)*1.4;
  var pages = pagesInFolder(L, catalog, folder.id);
  var h = '<div class="folder-block" style="margin-left:'+indent+'rem;">';
  h += '<div class="folder-sec-title">'+folderIcon(17)+'<span class="fname">'+escapeHtml(folder.name)+'</span>';
  if (isOwner()) {
    h += '<span style="display:flex;gap:0.3rem;">';
    if (depth < MAX_FOLDER_DEPTH) h += '<button class="icon-btn" onclick="createFolder(\''+folder.id+'\')">+ 폴더</button>';
    h += '<button class="icon-btn" onclick="renameFolder(\''+folder.id+'\')">&#9998;</button><button class="icon-btn" onclick="deleteFolder(\''+folder.id+'\')">&#128465;</button></span>';
  }
  h += '</div>';
  h += pages.length ? '<ul class="page-list">'+pages.map(function(p){return pageRowHtml(L,p);}).join('')+'</ul>' : '<div class="empty-state" style="padding:0.4rem 0;font-size:0.82rem;text-align:left;">(빈 폴더)</div>';
  childFolders(L, folder.id).forEach(function(cf) { h += folderBlockHtml(L, catalog, cf, depth+1); });
  return h + '</div>';
}
function renderBottom() {
  var L = getLayout(); var catalog = getCatalog();
  var host = document.getElementById('bottomSections');
  var html = '<div class="bottom-header"><h2>폴더 &amp; 전체 페이지</h2>' + (isOwner() ? '<button class="btn btn-sm" onclick="createFolder(null)">+ 폴더</button>' : '') + '</div>';
  childFolders(L, null).forEach(function(f) { html += folderBlockHtml(L, catalog, f, 1); });
  var loose = catalog.filter(function(p) { return !(L.pages[p.href].folderId) && !L.pages[p.href].pinned; });
  if (loose.length) html += '<div style="margin-top:0.8rem;"><div class="folder-sec-title"><span class="fname">미분류</span></div><ul class="page-list">'+loose.map(function(p){return pageRowHtml(L,p);}).join('')+'</ul></div>';
  else if (childFolders(L, null).length === 0 && catalog.length === 0) html += '<div class="empty-state">아직 페이지가 없습니다. + 새 페이지로 첫 슬라이드를 추가해보세요.</div>';
  host.innerHTML = html;
}

// ============================================================
// RENDER — 사이드바
// ============================================================
function navLinkHtml(p, padLeft) {
  var pad = padLeft != null ? ' style="padding-left:'+padLeft+'rem;"' : '';
  return '<a class="nav-item" data-href="'+escapeHtml(p.href)+'"'+pad+' onclick="openDoc(\''+jq(p.href)+'\', \''+jq(p.title)+'\', \''+jq(p.id)+'\')"><span class="nav-icon">'+pageIcon()+'</span> '+escapeHtml(p.title.length>22?p.title.slice(0,22)+'...':p.title)+'</a>';
}
function navFolderHtml(L, catalog, folder, depth, open) {
  var isOpen = !!open[folder.id];
  var pad = 1.5 + (depth-1)*0.9;
  var h = '<div class="nav-folder'+(isOpen?' open':'')+'" data-fid="'+folder.id+'"><div class="nav-folder-row"><button class="nav-folder-toggle" style="padding-left:'+pad+'rem;" onclick="toggleFolderOpen(\''+folder.id+'\')"><span class="nav-folder-caret">&#9656;</span><span class="nav-icon">'+folderIcon()+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(folder.name)+'</span></button></div><div class="nav-folder-children">';
  childFolders(L, folder.id).forEach(function(cf) { h += navFolderHtml(L, catalog, cf, depth+1, open); });
  pagesInFolder(L, catalog, folder.id).forEach(function(p) { h += navLinkHtml(p, pad+1.2); });
  return h + '</div></div>';
}
function renderSidebar() {
  var L = getLayout(); var catalog = getCatalog();
  var byHref = {}; catalog.forEach(function(p){byHref[p.href]=p;});
  var pinned = L.pinOrder.map(function(h){return byHref[h];}).filter(Boolean);
  document.getElementById('nav-pinned-links').innerHTML = pinned.map(function(p){return navLinkHtml(p);}).join('');
  var open = getFolderOpen();
  var roots = childFolders(L, null);
  var html = roots.length ? '<div class="nav-section">Folders</div>' : '';
  roots.forEach(function(f) { html += navFolderHtml(L, catalog, f, 1, open); });
  var loose = catalog.filter(function(p) { return !(L.pages[p.href].folderId) && !L.pages[p.href].pinned; });
  if (loose.length) html += '<div class="nav-section">Other Pages</div>' + loose.map(function(p){return navLinkHtml(p);}).join('');
  document.getElementById('nav-folder-tree').innerHTML = html;
  if (currentFrameHref) document.querySelectorAll('.nav-item[data-href]').forEach(function(el){ if (el.getAttribute('data-href')===currentFrameHref) el.classList.add('active'); });
}
function refreshAll() { renderPins(); renderBottom(); renderSidebar(); }
function filterCards(val) {
  var lower = (val||'').toLowerCase();
  document.querySelectorAll('.doc-card, .page-list-row').forEach(function(el) {
    el.style.display = (!val || el.textContent.toLowerCase().includes(lower)) ? '' : 'none';
  });
}

// ============================================================
// 페이지 뷰어 (iframe)
// ============================================================
var currentFrameHref = '';
var currentFrameId = '';
function openDoc(href, title, id) {
  currentFrameHref = href; currentFrameId = id || '';
  document.getElementById('wikiContent').style.display = 'none';
  document.body.classList.add('viewing');
  var frame = document.getElementById('docFrame');
  frame.onload = function() { try { frame.contentWindow.focus(); } catch(e) {} };
  frame.src = href;
  frame.classList.add('show');
  document.getElementById('frameToolbar').classList.add('show');
  document.getElementById('frameTitle').textContent = title || href;
  document.getElementById('frameEditBtn').style.display = isOwner() ? '' : 'none';
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-item[data-href]').forEach(function(el){ if (el.getAttribute('data-href')===href) el.classList.add('active'); });
}
function showHome() {
  document.getElementById('wikiContent').style.display = '';
  document.body.classList.remove('viewing');
  document.getElementById('docFrame').classList.remove('show');
  document.getElementById('docFrame').src = '';
  document.getElementById('frameToolbar').classList.remove('show');
  currentFrameHref = ''; currentFrameId = '';
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  document.getElementById('navHome').classList.add('active');
}
function openFrameInNewTab() { if (currentFrameHref) window.open(currentFrameHref, '_blank'); }

// ============================================================
// 새 페이지 / 편집 모달
// ============================================================
var pageModalEditingId = null;
function populateFolderSelect() {
  var L = getLayout();
  var list = L.folders.slice().sort(function(a,b){ return folderPath(L,a.id).localeCompare(folderPath(L,b.id)); });
  var sel = document.getElementById('pageFolder');
  var opts = '<option value="">📂 미분류(루트)</option>';
  list.forEach(function(f) { opts += '<option value="'+f.id+'">'+escapeHtml(folderPath(L,f.id))+'</option>'; });
  sel.innerHTML = opts;
}
function openNewPageModal() {
  if (!isOwner()) return;
  pageModalEditingId = null;
  document.getElementById('pageModalTitle').textContent = '새 페이지 추가';
  document.getElementById('pageTitle').value = '';
  document.getElementById('pageDesc').value = '';
  document.getElementById('pageCategory').value = 'slide';
  document.getElementById('pageHtml').value = '';
  document.getElementById('pageSaveBtn').textContent = '추가';
  document.getElementById('pageDeleteBtn').style.display = 'none';
  populateFolderSelect();
  document.getElementById('pageModalOverlay').classList.add('show');
}
async function openEditPageModal(id) {
  if (!isOwner()) return;
  var catalog = getCatalog();
  var p = catalog.find(function(x){ return x.id === id; });
  if (!p) return;
  pageModalEditingId = id;
  document.getElementById('pageModalTitle').textContent = '페이지 편집';
  document.getElementById('pageTitle').value = p.title;
  document.getElementById('pageDesc').value = p.desc;
  document.getElementById('pageCategory').value = p.category;
  document.getElementById('pageSaveBtn').textContent = '저장';
  document.getElementById('pageDeleteBtn').style.display = '';
  populateFolderSelect();
  var L = getLayout();
  document.getElementById('pageFolder').value = (L.pages[p.href] && L.pages[p.href].folderId) || '';
  document.getElementById('pageHtml').value = '불러오는 중...';
  document.getElementById('pageModalOverlay').classList.add('show');
  try {
    document.getElementById('pageHtml').value = await WikiStorage.loadPageHtml(id);
  } catch (e) {
    document.getElementById('pageHtml').value = '';
    alert('원본 HTML을 불러오지 못했습니다: ' + e.message);
  }
}
function closePageModal() { document.getElementById('pageModalOverlay').classList.remove('show'); pageModalEditingId = null; }

async function submitPage() {
  var title = document.getElementById('pageTitle').value.trim();
  var desc = document.getElementById('pageDesc').value.trim();
  var category = document.getElementById('pageCategory').value;
  var folderId = document.getElementById('pageFolder').value || null;
  var html = document.getElementById('pageHtml').value;
  if (!title) { alert('제목을 입력하세요.'); return; }
  if (!html.trim()) { alert('HTML 소스를 붙여넣어 주세요.'); return; }

  var saveBtn = document.getElementById('pageSaveBtn');
  saveBtn.disabled = true;
  try {
    if (pageModalEditingId) {
      await WikiStorage.savePageHtml(pageModalEditingId, html);
      var catalog = getCatalog();
      var p = catalog.find(function(x){ return x.id === pageModalEditingId; });
      p.title = title; p.desc = desc; p.category = category;
      saveCatalog(catalog);
      var L = getLayout(); ensurePage(L, p.href).folderId = folderId; saveLayout(L);
    } else {
      var created = await WikiStorage.createPage(html); // {id, href}
      var catalog2 = getCatalog();
      catalog2.push({ id: created.id, title: title, desc: desc, href: created.href, category: category, meta: '' });
      saveCatalog(catalog2);
      var L2 = getLayout(); ensurePage(L2, created.href).folderId = folderId; L2.pinOrder.push(created.href); saveLayout(L2);
    }
    closePageModal();
    refreshAll();
  } catch (e) {
    alert('저장에 실패했습니다: ' + e.message);
  } finally {
    saveBtn.disabled = false;
  }
}
async function deleteCurrentPage() {
  if (!pageModalEditingId) return;
  if (!confirm('이 페이지를 완전히 삭제합니다. 되돌릴 수 없습니다. 계속할까요?')) return;
  var catalog = getCatalog();
  var p = catalog.find(function(x){ return x.id === pageModalEditingId; });
  try {
    await WikiStorage.deletePage(pageModalEditingId);
    catalog = catalog.filter(function(x){ return x.id !== pageModalEditingId; });
    saveCatalog(catalog);
    if (p) { var L = getLayout(); delete L.pages[p.href]; L.pinOrder = L.pinOrder.filter(function(h){return h!==p.href;}); saveLayout(L); }
    closePageModal();
    if (currentFrameId === pageModalEditingId) showHome();
    refreshAll();
  } catch (e) {
    alert('삭제에 실패했습니다: ' + e.message);
  }
}

// ============================================================
// 로그인 / 권한
// ============================================================
function openLoginModal() { document.getElementById('loginModalOverlay').classList.add('show'); document.getElementById('loginError').style.display='none'; setTimeout(function(){document.getElementById('loginPassword').focus();},50); }
function closeLoginModal() { document.getElementById('loginModalOverlay').classList.remove('show'); document.getElementById('loginPassword').value=''; }
async function submitLogin() {
  var pw = document.getElementById('loginPassword').value;
  try {
    var ok = await WikiStorage.login(pw);
    if (!ok) { document.getElementById('loginError').style.display = ''; return; }
    closeLoginModal();
    await applyRole();
    refreshAll();
  } catch (e) { alert('로그인 중 오류: ' + e.message); }
}
async function doLogout() {
  await WikiStorage.logout();
  await applyRole();
  refreshAll();
}
async function applyRole() {
  try { ROLE = await WikiStorage.getRole(); } catch (e) { ROLE = 'viewer'; }
  document.getElementById('roleTag').textContent = ROLE;
  document.getElementById('loginBtn').style.display = isOwner() ? 'none' : '';
  document.getElementById('logoutBtn').style.display = isOwner() ? '' : 'none';
  document.getElementById('newPageBtn').style.display = isOwner() ? '' : 'none';
  document.getElementById('frameEditBtn').style.display = (isOwner() && currentFrameHref) ? '' : 'none';
}

// ============================================================
// 키보드 / 모달 바깥클릭
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closePageModal(); closeLoginModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});
['pageModalOverlay','loginModalOverlay'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
});
function toggleSidebar() {
  var layout = document.getElementById('layout');
  layout.classList.toggle('collapsed');
  document.getElementById('expandBtn').style.display = layout.classList.contains('collapsed') ? 'block' : 'none';
}

// ============================================================
// 초기화
// ============================================================
async function initializePage() {
  try {
    var payload = await WikiStorage.loadDoc('index.html');
    hubState.pages = Array.isArray(payload.pages) ? payload.pages : [];
    hubState.layout = (payload.layout && typeof payload.layout === 'object') ? payload.layout : null;
  } catch (e) {
    console.error('[hub] 문서 로드 실패:', e);
  }
  try { await applyRole(); } catch (e) { console.warn('[hub] 역할 조회 실패:', e); }
  refreshAll();
}
initializePage();
</script>
