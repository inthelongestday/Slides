name: Deploy to EC2 k3s

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout code
      uses: actions/checkout@v4

    - name: 2. Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: 3. Add GH Action IPs to SG
      run: |
        MY_IP=$(curl -s https://checkip.amazonaws.com)
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp --port 22 --cidr $MY_IP/32

    - name: 4. ECR Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 5. Build and Push
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: 6. Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # ECR 로그인
          aws ecr get-login-password --region ap-northeast-2 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.ECR_REGISTRY }}
          # k3s ECR 시크릿 갱신 (토큰 만료 방지)
          sudo kubectl delete secret ecr-secret --ignore-not-found
          sudo kubectl create secret docker-registry ecr-secret \
            --docker-server=${{ secrets.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ap-northeast-2)
          # 새 이미지로 배포
          sudo kubectl set image deployment/slides-api \
            slides-api=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          # 배포 완료 대기
          sudo kubectl rollout status deployment/slides-api

    - name : 7. Remove GH Action IPs from SG
      if: always()
      run: |
        MY_IP=$(curl -s https://checkip.amazonaws.com)
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.AWS_SG_ID }} \
          --protocol tcp --port 22 --cidr $MY_IP/32